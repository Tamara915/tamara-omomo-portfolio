<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tamara Omomo — Hero Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }

  /* ---- palette (from refs) ----
     ink #15100d · orange #f87f23 · red #cc0a0d · cream #f0dfcb · gray #9e9a9a */

  .hero { width: 100%; height: 100%; position: relative; overflow: hidden; }
  .ital { font-family: "Instrument Serif", Georgia, serif; font-style: italic; font-weight: 400; }
  .mono { font-family: "JetBrains Mono", monospace; }
  .grotesk { font-family: "Space Grotesk", sans-serif; }

  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes riseIn { from { transform: translateY(110%); } to { transform: translateY(0); } }
  @keyframes glow { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .9; } 50% { transform: translate(-50%,-50%) scale(1.12); opacity: 1; } }
  .cursor { animation: blink 1.1s steps(1) infinite; }

  /* ============ A — Editorial Swiss (cream / ink + orange) ============ */
  .A { background: #f0e7d8; color: #15100d; padding: 60px 68px; display: flex; flex-direction: column; }
  .A .gridrules { position: absolute; inset: 0; pointer-events: none; display: grid; grid-template-columns: repeat(6, 1fr); }
  .A .gridrules span { border-left: 1px solid rgba(21,16,13,0.06); }
  .A .topbar { position: relative; display: flex; justify-content: space-between; align-items: baseline; font-family: "JetBrains Mono"; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; border-bottom: 1px solid #15100d; padding-bottom: 16px; }
  .A .head { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .A h1 { font-family: "Space Grotesk"; font-weight: 500; font-size: 88px; line-height: 0.97; letter-spacing: -0.03em; margin: 0; max-width: 15ch; }
  .A h1 .ital { font-size: 100px; letter-spacing: -0.01em; color: #cc3711; }
  .A .sub { margin-top: 30px; max-width: 44ch; font-family: "Space Grotesk"; font-size: 18px; line-height: 1.5; color: #463d33; }
  .A .foot { position: relative; display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #15100d; padding-top: 16px; font-family: "JetBrains Mono"; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
  .A .idx { display: flex; gap: 38px; }
  .A .idx b { color: #cc3711; }

  /* ============ B — Brutalist dark (SMM Bureau) ============ */
  .B { background: #15100d; color: #f0dfcb; display: flex; flex-direction: column; justify-content: space-between; padding: 36px 0 0; }
  .B .top { display: flex; justify-content: space-between; align-items: center; padding: 0 44px; font-family: "JetBrains Mono"; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #c9bca8; }
  .B .top nav { display: flex; gap: 26px; }
  .B .giant { padding: 0 38px; }
  .B .giant h1 { font-family: "Space Grotesk"; font-weight: 700; text-transform: uppercase; font-size: clamp(80px, 14vw, 200px); line-height: 0.82; letter-spacing: -0.045em; margin: 0; color: #f87f23; }
  .B .giant .line { overflow: hidden; }
  .B .midrow { display: flex; justify-content: space-between; align-items: flex-end; padding: 26px 44px 0; }
  .B .midrow p { margin: 0; max-width: 38ch; font-family: "Space Grotesk"; font-size: 17px; line-height: 1.45; color: #b7ab97; }
  .B .pill { display: inline-flex; align-items: center; gap: 10px; border: 1px solid #4a4035; color: #f0dfcb; font-family: "JetBrains Mono"; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; padding: 13px 22px; border-radius: 100px; }
  .B .strip { margin-top: 26px; border-top: 1px solid #2c2620; background: #cc0a0d; color: #f0dfcb; overflow: hidden; white-space: nowrap; }
  .B .strip .marq { display: inline-block; animation: marquee 20s linear infinite; padding: 13px 0; }
  .B .strip .marq span { font-family: "JetBrains Mono"; font-weight: 700; font-size: 18px; letter-spacing: 0.05em; padding: 0 24px; }
  .B .strip .marq span.o { color: #15100d; }

  /* ============ C — Dark glow (Halo) ============ */
  .C { background: #120d0a; color: #f0dfcb; display: flex; flex-direction: column; align-items: center; padding: 30px 0 0; }
  .C .glow { position: absolute; left: 50%; top: 44%; width: 760px; height: 540px; border-radius: 50%; background: radial-gradient(closest-side, rgba(248,127,35,0.85), rgba(204,55,17,0.4) 55%, transparent 78%); filter: blur(20px); animation: glow 7s ease-in-out infinite; }
  .C .top { position: relative; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 36px; font-family: "JetBrains Mono"; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #c9bca8; }
  .C .navpills { display: flex; gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(240,223,203,0.12); padding: 5px; border-radius: 100px; }
  .C .navpills a { padding: 7px 14px; border-radius: 100px; color: #c9bca8; text-decoration: none; }
  .C .navpills a.on { background: #f0dfcb; color: #15100d; }
  .C .center { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .C h1 { font-family: "Space Grotesk"; font-weight: 500; font-size: 104px; line-height: 0.95; letter-spacing: -0.035em; margin: 0; }
  .C h1 .ital { color: #f0dfcb; }
  .C .sub { margin-top: 22px; max-width: 42ch; font-family: "Space Grotesk"; font-size: 17px; line-height: 1.5; color: #cdbfa9; }
  .C .ctas { margin-top: 30px; display: flex; gap: 12px; }
  .C .btn { font-family: "JetBrains Mono"; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; padding: 13px 22px; border-radius: 100px; }
  .C .btn.solid { background: #f87f23; color: #15100d; font-weight: 700; }
  .C .btn.ghost { border: 1px solid rgba(240,223,203,0.25); color: #f0dfcb; }
  .C .ghostmark { position: relative; width: 100%; text-align: center; font-family: "Space Grotesk"; font-weight: 700; text-transform: uppercase; font-size: 150px; line-height: 0.9; letter-spacing: -0.04em; color: transparent; -webkit-text-stroke: 1px rgba(240,223,203,0.12); margin-bottom: -28px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function HeroA() {
  return (
    <div className="hero A">
      <div className="gridrules">{[0,1,2,3,4,5].map(i => <span key={i}/>)}</div>
      <div className="topbar">
        <span>Tamara Omomo</span>
        <span>GTM Engineer — Portfolio &rsquo;26</span>
      </div>
      <div className="head">
        <h1 className="grotesk">Building the <span className="ital">systems</span> that turn raw data into <span className="ital">revenue</span>.</h1>
        <p className="sub">A GTM engineer working in the seam between marketing, sales and code — pipelines, enrichment, and the automation that makes them compound.</p>
      </div>
      <div className="foot">
        <div className="idx"><span><b>01</b> Selected Work</span><span><b>02</b> Stack</span><span><b>03</b> Contact</span></div>
        <span>Available Q3 &rsquo;26</span>
      </div>
    </div>
  );
}

function HeroB() {
  return (
    <div className="hero B">
      <div className="top">
        <span>Tamara Omomo</span>
        <nav><span>work</span><span>stack</span><span>contact</span></nav>
      </div>
      <div className="giant">
        <div className="line l1"><h1 className="grotesk">Go-To-Market</h1></div>
        <div className="line l2"><h1 className="grotesk">Engineer</h1></div>
      </div>
      <div>
        <div className="midrow">
          <p>I turn messy go-to-market into systems that run themselves — data in, qualified pipeline out.</p>
          <span className="pill">Start work&nbsp; →</span>
        </div>
        <div className="strip">
          <div className="marq">
            <span>CLAY</span><span className="o">·</span><span>HUBSPOT</span><span className="o">·</span><span>PYTHON</span><span className="o">·</span><span>SQL</span><span className="o">·</span><span>AUTOMATION</span><span className="o">·</span><span>CLAY</span><span className="o">·</span><span>HUBSPOT</span><span className="o">·</span><span>PYTHON</span><span className="o">·</span><span>SQL</span><span className="o">·</span><span>AUTOMATION</span><span className="o">·</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function HeroC() {
  return (
    <div className="hero C">
      <div className="glow"></div>
      <div className="top">
        <span>✳ Tamara Omomo</span>
        <div className="navpills"><a className="on">work</a><a>stack</a><a>about</a><a>contact</a></div>
        <span>GTM Engineer</span>
      </div>
      <div className="center">
        <h1 className="grotesk">Go-to-market,<br/><span className="ital">engineered</span>.</h1>
        <p className="sub">Half operator, half engineer. I design and build the revenue machine — enrichment, routing and automation across the whole funnel.</p>
        <div className="ctas">
          <span className="btn solid">See the work</span>
          <span className="btn ghost">Let&rsquo;s talk →</span>
        </div>
      </div>
      <div className="ghostmark">OMOMO</div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="Hero Directions — v2" subtitle="Warm dark + burnt orange, pulled from your references. Pick one (or mix) and I'll build the full scrolling site.">
        <DCArtboard id="A" label="A · Editorial — cream / ink + ember" width={1280} height={780}><HeroA/></DCArtboard>
        <DCArtboard id="B" label="B · Brutalist dark — SMM Bureau energy" width={1280} height={780}><HeroB/></DCArtboard>
        <DCArtboard id="C" label="C · Dark glow — Halo energy" width={1280} height={780}><HeroC/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
